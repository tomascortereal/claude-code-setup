<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#2C3E50">How Claude Code Setup Works</text>

  <!-- Main Container (dashed) -->
  <rect x="140" y="55" width="920" height="830" rx="12" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="600" y="82" text-anchor="middle" font-size="16" font-weight="bold" fill="#495057">CLAUDE CODE CLI</text>

  <!-- YOU person icon -->
  <circle cx="65" cy="310" r="18" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <line x1="65" y1="328" x2="65" y2="370" stroke="#6c8ebf" stroke-width="2"/>
  <line x1="40" y1="345" x2="90" y2="345" stroke="#6c8ebf" stroke-width="2"/>
  <line x1="65" y1="370" x2="42" y2="400" stroke="#6c8ebf" stroke-width="2"/>
  <line x1="65" y1="370" x2="88" y2="400" stroke="#6c8ebf" stroke-width="2"/>
  <text x="65" y="420" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E50">YOU</text>

  <!-- Arrow: YOU to container -->
  <line x1="100" y1="350" x2="135" y2="350" stroke="#2C3E50" stroke-width="3"/>
  <polygon points="140,350 132,344 132,356" fill="#2C3E50"/>
  <text x="120" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">prompt</text>

  <!-- ===== SECTION 1: SETTINGS.JSON (Foundation) ===== -->

  <rect x="175" y="100" width="850" height="100" rx="10" fill="#2c3e50" stroke="#1a252f" filter="url(#shadow)"/>
  <text x="600" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">settings.json</text>
  <text x="600" y="150" text-anchor="middle" font-size="11" fill="#bdc3c7" font-style="italic">The Foundation</text>
  <text x="600" y="175" text-anchor="middle" font-size="12" fill="#ffffff">model, plugins, hooks, env vars, permissions, telemetry</text>
  <text x="600" y="192" text-anchor="middle" font-size="11" fill="#95a5a6">Defines WHAT tools exist and HOW the runtime is configured</text>

  <!-- Arrow: Settings to Memory -->
  <line x1="600" y1="210" x2="600" y2="240" stroke="#bdc3c7" stroke-width="2"/>
  <polygon points="600,245 594,237 606,237" fill="#bdc3c7"/>

  <!-- ===== SECTION 2: GLOBAL MEMORY (Context) ===== -->

  <rect x="175" y="250" width="850" height="100" rx="10" fill="#27ae60" stroke="#229954" filter="url(#shadow)"/>
  <text x="600" y="280" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Global Memory</text>
  <text x="600" y="300" text-anchor="middle" font-size="11" fill="#a9dfbf" font-style="italic">~/.claude/memory/</text>
  <text x="600" y="322" text-anchor="middle" font-size="12" fill="#ffffff">Shared across ALL projects via symlinks</text>
  <text x="600" y="339" text-anchor="middle" font-size="11" fill="#d5f5e3">Preferences, dev profile, past decisions — cross-session context</text>

  <!-- Arrow: Memory to CLAUDE.md -->
  <line x1="600" y1="360" x2="600" y2="390" stroke="#bdc3c7" stroke-width="2"/>
  <polygon points="600,395 594,387 606,387" fill="#bdc3c7"/>

  <!-- ===== SECTION 3: CLAUDE.MD (The Brain) ===== -->

  <rect x="175" y="400" width="850" height="110" rx="10" fill="#1a1a2e" stroke="#0d0d1a" filter="url(#shadow)"/>
  <text x="600" y="430" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">CLAUDE.md</text>
  <text x="600" y="452" text-anchor="middle" font-size="11" fill="#cccccc" font-style="italic">"The Brain"</text>
  <text x="600" y="477" text-anchor="middle" font-size="12" fill="#ffffff">15 sections of instructions with 14 auto-decision rules</text>
  <text x="600" y="497" text-anchor="middle" font-size="11" fill="#95a5a6">Rules automatically match your request to the right combination of tools</text>

  <!-- Arrow: CLAUDE.md to Execution -->
  <line x1="600" y1="520" x2="600" y2="550" stroke="#bdc3c7" stroke-width="2"/>
  <polygon points="600,555 594,547 606,547" fill="#bdc3c7"/>

  <!-- ===== SECTION 4: EXECUTION LAYER ===== -->

  <!-- Skills -->
  <rect x="175" y="560" width="270" height="140" rx="12" fill="#e74c3c" stroke="#c0392b" filter="url(#shadow)"/>
  <text x="310" y="588" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Skills</text>
  <text x="310" y="616" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">101</text>
  <text x="310" y="634" text-anchor="middle" font-size="10" fill="#f5c6cb">/slash commands</text>
  <text x="310" y="660" text-anchor="middle" font-size="10" fill="#ffffff">TDD, debugging,</text>
  <text x="310" y="674" text-anchor="middle" font-size="10" fill="#ffffff">planning, brainstorming,</text>
  <text x="310" y="688" text-anchor="middle" font-size="10" fill="#ffffff">code review...</text>

  <!-- Agents -->
  <rect x="465" y="560" width="270" height="140" rx="12" fill="#9b59b6" stroke="#8e44ad" filter="url(#shadow)"/>
  <text x="600" y="588" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Agents</text>
  <text x="600" y="616" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">25</text>
  <text x="600" y="634" text-anchor="middle" font-size="10" fill="#e8d5f5">spawned workers</text>
  <text x="600" y="660" text-anchor="middle" font-size="10" fill="#ffffff">Code review, parallel</text>
  <text x="600" y="674" text-anchor="middle" font-size="10" fill="#ffffff">tasks, research,</text>
  <text x="600" y="688" text-anchor="middle" font-size="10" fill="#ffffff">exploration...</text>

  <!-- Plugins & MCP -->
  <rect x="755" y="560" width="270" height="140" rx="12" fill="#2980b9" stroke="#2471a3" filter="url(#shadow)"/>
  <text x="890" y="588" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Plugins &amp; MCP</text>
  <text x="890" y="616" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">19</text>
  <text x="890" y="634" text-anchor="middle" font-size="10" fill="#d4e6f1">MCP servers</text>
  <text x="890" y="660" text-anchor="middle" font-size="10" fill="#ffffff">Serena, Context7, Playwright,</text>
  <text x="890" y="674" text-anchor="middle" font-size="10" fill="#ffffff">Supabase, claude-mem,</text>
  <text x="890" y="688" text-anchor="middle" font-size="10" fill="#ffffff">code-review-graph...</text>

  <!-- Arrow: Execution to Hooks -->
  <line x1="600" y1="710" x2="600" y2="740" stroke="#bdc3c7" stroke-width="2"/>
  <polygon points="600,745 594,737 606,737" fill="#bdc3c7"/>

  <!-- ===== SECTION 5: HOOKS ===== -->

  <!-- SessionStart -->
  <rect x="175" y="750" width="268" height="90" rx="10" fill="#f39c12" stroke="#e67e22" filter="url(#shadow)"/>
  <text x="309" y="777" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">SessionStart</text>
  <text x="309" y="802" text-anchor="middle" font-size="10" fill="#ffffff">Memory sync</text>
  <text x="309" y="816" text-anchor="middle" font-size="10" fill="#ffffff">Update checks</text>
  <text x="309" y="830" text-anchor="middle" font-size="10" fill="#ffffff">Plugin sync</text>

  <!-- PreToolUse -->
  <rect x="463" y="750" width="268" height="90" rx="10" fill="#f39c12" stroke="#e67e22" filter="url(#shadow)"/>
  <text x="597" y="777" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">PreToolUse</text>
  <text x="597" y="802" text-anchor="middle" font-size="10" fill="#ffffff">Security scan</text>
  <text x="597" y="816" text-anchor="middle" font-size="10" fill="#ffffff">Prompt guard</text>
  <text x="597" y="830" text-anchor="middle" font-size="10" fill="#ffffff">Read validation</text>

  <!-- PostToolUse -->
  <rect x="751" y="750" width="274" height="90" rx="10" fill="#f39c12" stroke="#e67e22" filter="url(#shadow)"/>
  <text x="888" y="777" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">PostToolUse</text>
  <text x="888" y="802" text-anchor="middle" font-size="10" fill="#ffffff">Context monitor</text>
  <text x="888" y="816" text-anchor="middle" font-size="10" fill="#ffffff">Track usage</text>

</svg>
